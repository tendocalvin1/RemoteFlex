name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Check And Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: job-portal-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: job-portal-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create test environment file
        run: |
          cat <<EOF > .env
          NODE_ENV=test
          PORT=8000
          JWT_SECRET=test-jwt-secret
          JWT_REFRESH_SECRET=test-refresh-secret
          MONGO_URI=mongodb://127.0.0.1:27017/remoteflex_test
          CLIENT_URL=http://localhost:3000
          EMAIL_HOST=smtp.example.com
          EMAIL_PORT=465
          EMAIL_USER=test@example.com
          EMAIL_PASSWORD=test-password
          EMAIL_FROM=test@example.com
          EOF

      - name: Syntax check
        run: npm run check

      - name: Run tests
        run: npm test

  frontend:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: job-portal-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: job-portal-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build