<!DOCTYPE html>
<html>
<head>
  <title>Socket.io Test</title>
</head>
<body>
  <h2>Socket.io Real-time Test</h2>
  <p id="status">Connecting...</p>
  <p id="notification"></p>

  <script src="http://localhost:8000/socket.io/socket.io.js"></script>
  <script>
    const socket = io('http://localhost:8000');

    socket.on('connect', () => {
      document.getElementById('status').textContent = 'Connected: ' + socket.id;

      // Simulate a logged in user registering their socket
      socket.emit('register', '69d3752be49e6edf59466d63');
    });

    socket.on('applicationStatusUpdate', (data) => {
      document.getElementById('notification').textContent =
        'NOTIFICATION: ' + data.message;
    });

    socket.on('disconnect', () => {
      document.getElementById('status').textContent = 'Disconnected';
    });
  </script>
</body>
</html>
